<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora cat</title>
</head>

<body>
    <input id="num1" type="number" placeholder="Número 1">
    <input id="num2" type="number" placeholder="Número 2">
    <button onclick="calculo(somar)">Somar</button>
    <button onclick="calculo(subtrair)">subtrair</button>
    <button onclick="calculo(multiplicar)">multiplicar</button>
    <button onclick="calculo(dividir)">dividir</button>
    <button onclick="TESTAR()">TESTAR</button>
    <button onclick="testarComponente()" id="Componentes">Rodar Testes Componentes</button>
    <div id="resultado"></div>

</body>

<script>

    function calculo(operacao) {
        const n1 = parseFloat(document.getElementById("num1").value);
        const n2 = parseFloat(document.getElementById("num2").value);
        const mensagem = document.getElementById("resultado")
        mensagem.innerText = `resultado= ${operacao(n1, n2)}`
    }



    function somar(n1, n2) {
        return n1 + n2;
    }

    function subtrair(n1, n2) {
        return n1 - n2;
    }

    function multiplicar(n1, n2) {
        return n1 * n2;
    }


    function dividir(n1, n2) {
        if (n2 == 0) {
            return "não pode"
        }
        else {
            return n1 / n2;
        }
    }
    function TESTAR() {
        testar("somar 2 4", somar(2, 4), 6)
        testar("subtrair 6 8", subtrair(6, 8), -2)
        testar("multiplicar 5 7", multiplicar(5, 7), 35)
        testar("dividir 5 0", dividir(5, 0), "não pode")
    }
    function testar(desc, result, esperado) {
        if (result == esperado) {
            console.log(desc)
        }
        else {
            console.log(`${desc} esperado ${esperado} resultado ${result} `)
        }
    }
    function testarComponente() {
        const n1 = (document.getElementById("num1"));
        const n2 = (document.getElementById("num2"));
        const somar = document.getElementById("somar")
        const subtrair = document.getElementById("subtrair")
        const multiplicar = document.getElementById("multiplicar")
        const dividir = document.getElementById("dividir")
        const testes = document.getElementById("testes")
        const Componentes = document.getElementById("Componentes")
        const resultado = document.getElementById("resultado")

        console.log("Testes de Componentes:")

        // componente n1

        if (!n1) {

            console.log("Componente n1 não encontrado")

        }

        else {

            console.log("Componente n1 encontrado, teste OK")

        }



        //componente n2

        if (!n2) {

            console.log("Componente n2 não encontrado")

        }

        else {

            console.log("Componente n2 encontrado, teste OK")

        }

        //componente somar

        if (!somar) {

            console.log("Componente somar não encontrado")

        }

        else {

            console.log("Componente somar encontrado, teste OK")

        }



        //componente subtrair

        if (!subtrair) {

            console.log("Componente subtrair não encontrado")

        }

        else {

            console.log("Componente subtrair encontrado, teste OK")

        }



        //componente multiplicar

        if (!multiplicar) {

            console.log("Componente multiplicar não encontrado")

        }

        else {

            console.log("Componente multiplicar encontrado, teste OK")

        }



        //componente dividir

        if (!dividir) {

            console.log("Componente dividir não encontrado")

        }

        else {

            console.log("Componente dividir encontrado, teste OK")

        }



        //componente testes

        if (!testes) {

            console.log("Componente testes não encontrado")

        }

        else {

            console.log("Componente testes encontrado, teste OK")

        }

        //componente Componentes

        if (!Componentes) {

            console.log("Componente Componentes não encontrado")

        }

        else {

            console.log("Componente Componentes encontrado, teste OK")

        }

        //componente Componentes

        if (!resultado) {

            console.log("Componente resultado não encontrado")

        }

        else {

            console.log("Componente resultado encontrado, teste OK")

        }


    }
</script>


</html>
